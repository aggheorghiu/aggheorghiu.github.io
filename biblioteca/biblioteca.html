<html>
  <head>
    <title>Dictionar de corporateza</title>
    <link rel="stylesheet" href="/biblioteca/style.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Voces&display=swap"
      rel="stylesheet"
    />
  </head>

  <!-- Navbar -->
  <body>
    <nav class="navbar">
      <div class="nav-logo">UC</div>
      <div class="nav-links">
        <a href="/home.html">Acasă</a>
        <a href="/dictionar/home.html">Dicționar</a>
        <a href="/biblioteca/biblioteca.html">Bibliotecă</a>
      </div>
    </nav>
    
    <!-- Banner -->
    <div class="hero">
      <div class="hero-label" id="heroLabel"></div>
    </div>

    <!-- Carusele 1, 2, 3 -->
    <div class="carousels-container">
      <!-- Carousel 1 -->
      <div class="carousel-wrapper filme">
        <h2>Movies</h2>
        <div class="carousel-row">
          <button class="nav prev">‹</button>
          <div class="carousel-viewport">
            <div class="carousel-track" id="filme-track"></div>
          </div>
          <button class="nav next">›</button>
        </div>
      </div>

      <!-- Carousel 2 -->
      <div class="carousel-wrapper banking">
        <h2>Books</h2>
        <div class="carousel-row">
          <button class="nav prev">‹</button>
          <div class="carousel-viewport">
            <div class="carousel-track" id="banking-track"></div>
          </div>
          <button class="nav next">›</button>
        </div>
      </div>

      <!-- Carousel 3 -->
      <div class="carousel-wrapper economie">
        <h2>Articles</h2>
        <div class="carousel-row">
          <button class="nav prev">‹</button>
          <div class="carousel-viewport">
            <div class="carousel-track" id="economie-track"></div>
          </div>
          <button class="nav next">›</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <button class="modal-close" id="modalClose">×</button>

        <div class="modal-content">
          <img id="modalImage" alt="" />
          <div class="modal-info">
            <h3 id="modalTitle"></h3>
            <p class="modal-extra" id="modalExtra"></p>
            <p class="modal-meta" id="modalMeta"></p>
            <p class="modal-description" id="modalDescription"></p>
            <a id="modalTrailer" class="modal-trailer" target="_blank">Link</a>
          </div>
        </div>
      </div>
    </div>

    <script src="/biblioteca/magic.js"></script>
  </body>
   <footer class="footer">
    <p>
      If you have any suggestions, <br />
      message us on Teams at:
      <strong style="color: #007acc">UQ00128 </strong>,
      <strong style="color: #007acc">C329526</strong>
      or at
      <strong style="color: #007acc">C328140</strong>
    </p>
  </footer>
</html>
